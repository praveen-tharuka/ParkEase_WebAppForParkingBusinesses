services:
  postgres:
    image: postgres:16-alpine
    container_name: parkease-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parkease
    ports:
      - "5432:5432"
    volumes:
      - parkease_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parkease"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parkease-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - parkease_redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parkease-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/parkease?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: development
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma

volumes:
  parkease_postgres_data:
  parkease_redis_data:
